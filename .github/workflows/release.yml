name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          path: sheetmind-mcp
          release-type: maven
          package-name: sheetmind-mcp
          extra-files: |
            package.json

  build-jar:
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn -f sheetmind-mcp/pom.xml clean package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: sheetmind-jar
          path: sheetmind-mcp/target/*.jar

  build-native-linux:
    needs: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          components: 'native-image'

      - name: Build Native Image
        run: |
          export GRAALVM_HOME=$JAVA_HOME
          mvn -f sheetmind-mcp/pom.xml package -Pnative -DskipTests

      - name: Rename Linux Native
        run: mv sheetmind-mcp/target/sheetmind sheetmind-linux

      - name: Upload Linux Native
        uses: actions/upload-artifact@v4
        with:
          name: sheetmind-linux
          path: sheetmind-linux

  build-native-macos:
    needs: release-please
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          components: 'native-image'

      - name: Build Native Image
        run: |
          export GRAALVM_HOME=$JAVA_HOME
          mvn -f sheetmind-mcp/pom.xml package -Pnative -DskipTests

      - name: Rename macOS Native
        run: mv sheetmind-mcp/target/sheetmind sheetmind-macos

      - name: Upload macOS Native
        uses: actions/upload-artifact@v4
        with:
          name: sheetmind-macos
          path: sheetmind-macos

  build-native-windows:
    needs: release-please
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21'
          java-version: '21'
          components: 'native-image'

      - name: Build Native Image
        run: |
          $env:GRAALVM_HOME = $env:JAVA_HOME
          mvn -f sheetmind-mcp/pom.xml package -Pnative -DskipTests

      - name: Upload Windows Native
        uses: actions/upload-artifact@v4
        with:
          name: sheetmind-windows
          path: sheetmind-mcp/target/sheetmind.exe

  upload-assets:
    needs: [release-please, build-jar, build-native-linux, build-native-macos, build-native-windows]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: sheetmind-jar
          path: jar

      - name: Download Linux Native
        uses: actions/download-artifact@v4
        with:
          name: sheetmind-linux
          path: linux

      - name: Download macOS Native
        uses: actions/download-artifact@v4
        with:
          name: sheetmind-macos
          path: macos

      - name: Download Windows Native
        uses: actions/download-artifact@v4
        with:
          name: sheetmind-windows
          path: windows

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ls -la
          
          gh release upload "${{ needs.release-please.outputs.tag_name }}" jar/sheetmind-mcp-jar-with-dependencies.jar --clobber
          
          chmod +x linux/sheetmind-linux
          gh release upload "${{ needs.release-please.outputs.tag_name }}" linux/sheetmind-linux --clobber
          
          chmod +x macos/sheetmind-macos
          gh release upload "${{ needs.release-please.outputs.tag_name }}" macos/sheetmind-macos --clobber
          
          gh release upload "${{ needs.release-please.outputs.tag_name }}" windows/sheetmind.exe --clobber
